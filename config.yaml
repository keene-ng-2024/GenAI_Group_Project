# ── Model configuration ────────────────────────────────────────────────────────
models:
  strong: "gpt-4.1-mini"   # used for agentic loop & critique-dict building
  fast:   "gpt-4.1-mini"   # used for cheap sub-calls (same model, best cost:perf ratio)
  baseline: "gpt-4.1-mini" # single-call baseline

# ── Reproducibility ────────────────────────────────────────────────────────────
seed: 42
temperature: 0.2
max_tokens: 4096

# ── Data ───────────────────────────────────────────────────────────────────────
data:
  raw_dir: "data/raw"
  jsonl_file: "data/ReviewCritique.jsonl"
  processed_dir: "data/processed"
  reviews_file: "data/processed/reviews_parsed.json"
  critique_dicts_dir: "data/processed/critique_dicts"

# ── Critique-dict building ─────────────────────────────────────────────────────
critique_dict:
  min_points: 3
  max_points: 15
  similarity_threshold: 0.85   # cosine sim above which two points are merged

# ── Agentic loop ───────────────────────────────────────────────────────────────
agent:
  max_rounds: 3                # debate rounds between Critic and Auditor
  truncate_body_chars: 12000   # truncate full paper text fed to Reader
  use_tools: true              # toggle tool-use for Critic/Auditor (false for ablation)
  max_tool_calls: 5            # hard cap on tool calls per agent turn
  early_stop_phrases:
    - "no further concerns"
    - "i am satisfied"
    - "well-supported"
    - "approve"
  model_map:
    reader: "gpt-4.1-mini"
    critic: "gpt-4.1-mini"
    auditor: "gpt-4.1-mini"
    summariser: "gpt-4.1-mini"
  roles:
    - Reader
    - Critic
    - Auditor
    - Summariser

# ── Evaluation ─────────────────────────────────────────────────────────────────
evaluation:
  similarity_threshold: 0.50   # cosine sim to count a point as "covered" (lower for long-form critiques)
  embedding_model: "all-MiniLM-L6-v2"

# ── n8n platform ───────────────────────────────────────────────────────────────
n8n:
  webhook_url: "http://localhost:5678/webhook/paper-critique"          # 1-round workflow
  webhook_url_noloop: "http://localhost:5678/webhook/paper-critique-noloop"  # no-loop workflow
  reader_model: "gpt-4.1-mini"
  critic_model: "gpt-4.1-mini"
  auditor_model: "gpt-4.1-mini"
  summariser_model: "gpt-4.1-mini"

# ── LangGraph platform ─────────────────────────────────────────────────────────
langgraph:
  reader_model: "gpt-4.1-mini"
  critic_model: "gpt-4.1-mini"
  auditor_model: "gpt-4.1-mini"
  summariser_model: "gpt-4.1-mini"
  loop_mode: "dynamic"   # none | fixed | dynamic

# ── Dify platform ──────────────────────────────────────────────────────────────
dify:
  reader_model: "gpt-4.1-mini"
  critic_model: "gpt-4.1-mini"
  auditor_model: "gpt-4.1-mini"
  summariser_model: "gpt-4.1-mini"

# ── CrewAI platform ────────────────────────────────────────────────────────────
crewai:
  reader_model: "gpt-4.1-mini"
  critic_model: "gpt-4.1-mini"
  auditor_model: "gpt-4.1-mini"
  summariser_model: "gpt-4.1-mini"

# ── Results ────────────────────────────────────────────────────────────────────
results:
  baseline_dir: "results/baseline"
  agents_dir: "results/agents"
  n8n_dir: "results/n8n"
  n8n_noloop_dir: "results/n8n_noloop"
  langgraph_dir: "results/langgraph"
  langgraph_none_dir: "results/langgraph_none"
  langgraph_fixed_dir: "results/langgraph_fixed"
  langgraph_dynamic_dir: "results/langgraph_dynamic"
  vertexai_dir: "results/vertexai"
  dify_dir: "results/dify"
  crewai_dir: "results/crewai"
