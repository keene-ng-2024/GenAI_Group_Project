# ── Model configuration ────────────────────────────────────────────────────────
models:
  strong: "claude-sonnet-4-6"       # used for agentic loop & critique-dict building
  fast:   "claude-haiku-4-5-20251001"  # used for cheap sub-calls (summarise, verify)
  baseline: "claude-sonnet-4-6"     # single-call baseline

# ── Reproducibility ────────────────────────────────────────────────────────────
seed: 42
temperature: 0.2
max_tokens: 4096

# ── Data ───────────────────────────────────────────────────────────────────────
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  reviews_file: "data/processed/reviews_parsed.json"
  critique_dicts_dir: "data/processed/critique_dicts"

# ── Critique-dict building ─────────────────────────────────────────────────────
critique_dict:
  min_points: 3
  max_points: 15
  similarity_threshold: 0.85   # cosine sim above which two points are merged

# ── Agentic loop ───────────────────────────────────────────────────────────────
agent:
  max_rounds: 5                # maximum debate rounds between Critic and Auditor
  roles:
    - Reader
    - Critic
    - Auditor
    - Summariser

# ── Evaluation ─────────────────────────────────────────────────────────────────
evaluation:
  similarity_threshold: 0.75   # cosine sim to count a point as "covered"
  embedding_model: "all-MiniLM-L6-v2"

# ── Results ────────────────────────────────────────────────────────────────────
results:
  baseline_dir: "results/baseline"
  agents_dir: "results/agents"
