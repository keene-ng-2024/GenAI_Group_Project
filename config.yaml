# ── Model configuration ────────────────────────────────────────────────────────
models:
  strong: "claude-sonnet-4-6"       # used for agentic loop & critique-dict building
  fast:   "claude-haiku-4-5-20251001"  # used for cheap sub-calls (summarise, verify)
  baseline: "claude-sonnet-4-6"     # single-call baseline

# ── Reproducibility ────────────────────────────────────────────────────────────
seed: 42
temperature: 0.2
max_tokens: 4096

# ── Data ───────────────────────────────────────────────────────────────────────
data:
  raw_dir: "data/raw"
  jsonl_file: "data/ReviewCritique.jsonl"
  processed_dir: "data/processed"
  reviews_file: "data/processed/reviews_parsed.json"
  critique_dicts_dir: "data/processed/critique_dicts"

# ── Critique-dict building ─────────────────────────────────────────────────────
critique_dict:
  min_points: 3
  max_points: 15
  similarity_threshold: 0.85   # cosine sim above which two points are merged

# ── Agentic loop ───────────────────────────────────────────────────────────────
agent:
  max_rounds: 3                # debate rounds between Critic and Auditor
  truncate_body_chars: 12000   # truncate full paper text fed to Reader
  use_tools: true              # toggle tool-use for Critic/Auditor (false for ablation)
  max_tool_calls: 5            # hard cap on tool calls per agent turn
  early_stop_phrases:
    - "no further concerns"
    - "i am satisfied"
    - "well-supported"
    - "approve"
  model_map:
    reader: "claude-haiku-4-5-20251001"     # cheap — just reads and summarises
    critic: "claude-sonnet-4-6"             # main reasoning
    auditor: "claude-haiku-4-5-20251001"    # cheaper challenger
    summariser: "claude-sonnet-4-6"         # output quality matters
  roles:
    - Reader
    - Critic
    - Auditor
    - Summariser

# ── Evaluation ─────────────────────────────────────────────────────────────────
evaluation:
  similarity_threshold: 0.50   # cosine sim to count a point as "covered" (lower for long-form critiques)
  embedding_model: "all-MiniLM-L6-v2"

# ── n8n platform ───────────────────────────────────────────────────────────────
n8n:
  webhook_url: "http://localhost:5678/webhook/paper-critique"  # update if using cloud n8n
  # models used inside the n8n workflow (OpenRouter format)
  reader_model: "google/gemini-flash-1.5"
  critic_model: "google/gemini-pro-1.5"
  auditor_model: "google/gemini-flash-1.5"
  summariser_model: "google/gemini-pro-1.5"

# ── LangGraph platform ─────────────────────────────────────────────────────────
langgraph:
  loop_mode: "dynamic"            # "none" | "fixed" | "dynamic" (ablation control)
  early_stop_phrases:             # phrases that trigger early exit in dynamic mode
    - "no further concerns"
    - "i am satisfied"
    - "well-supported"
    - "approve"
  # OpenAI models used inside the LangGraph workflow
  reader_model: "gpt-4o-mini"
  critic_model: "gpt-4o"
  auditor_model: "gpt-4o-mini"
  summariser_model: "gpt-4o"

# ── Results ────────────────────────────────────────────────────────────────────
results:
  baseline_dir: "results/baseline"
  agents_dir: "results/agents"
  n8n_dir: "results/n8n"
  langgraph_dir: "results/langgraph"
  langgraph_none_dir: "results/langgraph_none"
  langgraph_fixed_dir: "results/langgraph_fixed"
  langgraph_dynamic_dir: "results/langgraph_dynamic"
